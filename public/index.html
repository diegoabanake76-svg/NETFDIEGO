<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamVerse</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <nav class="nav-bar">
          <div class="brand">STREAMVERSE</div>
          <div class="nav-links">
            <a href="#">Inicio</a>
            <a href="#">Series</a>
            <a href="#">Películas</a>
            <a href="#">Mi lista</a>
          </div>
        </nav>
        <div class="hero-content">
          <p class="eyebrow">NUEVA TEMPORADA</p>
          <h1>La ciudad que nunca duerme</h1>
          <p>Una serie intensa, urbana y cargada de suspense, con el ritmo de una producción premium.</p>
          <div class="hero-actions">
            <button class="btn btn-primary">▶ Reproducir</button>
            <button class="btn btn-secondary">+ Mi lista</button>
          </div>
        </div>
      </header>

      <main>
        <section class="row">
          <h2>Continuar viendo</h2>
          <div id="novedades" class="cards"></div>
        </section>
        <section class="row">
          <h2>Solo para ti</h2>
          <div id="para-ti" class="cards"></div>
        </section>
        <section class="row">
          <h2>Top 10 en México</h2>
          <div id="top10" class="cards"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
